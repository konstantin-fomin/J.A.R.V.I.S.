<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>J.A.R.V.I.S.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0C0F14;
    --tile:#161B23;
    --tile-hi:#1C222C;
    --line:#262D38;
    --line-soft:#1F252F;
    --accent:#F0A93B;
    --accent-soft: rgba(240,169,59,.12);
    --accent-line: rgba(240,169,59,.35);
    --good:#74B093;
    --good-soft: rgba(116,176,147,.13);
    --info:#7AA0CC;
    --danger:#D26851;
    --danger-soft: rgba(210,104,81,.13);
    --text:#EFEAE0;
    --text-dim:#8A9099;
    --text-faint:#535A63;
    --mono:'IBM Plex Mono', monospace;
    --sans:'Manrope', sans-serif;
    --gap:16px;
    --radius:18px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg);}
  body{ color:var(--text); font-family:var(--sans); -webkit-font-smoothing:antialiased; min-height:100vh; }
  *:focus-visible{ outline:2px solid var(--accent); outline-offset:2px; }

  .grid{
    display:grid;
    grid-template-columns:repeat(2, 1fr);
    gap:var(--gap);
    padding:var(--gap);
    max-width:1080px;
    margin:0 auto;
    min-height:100vh;
    align-content:start;
    grid-auto-rows:min-content;
  }
  .tile{
    background:var(--tile);
    border:1px solid var(--line-soft);
    border-radius:var(--radius);
    padding:22px 24px;
    position:relative;
    overflow:hidden;
  }
  .col-2{ grid-column:span 2; }
  .row-tall{ grid-row:span 2; }

  .tile.urgent{ border-color:var(--accent-line); background:linear-gradient(180deg, var(--accent-soft), var(--tile) 60%); }
  .tile.urgent::after{
    content:''; position:absolute; inset:0; border-radius:var(--radius); pointer-events:none;
    box-shadow:inset 0 0 0 1px var(--accent-line); animation:breathe 3.4s ease-in-out infinite;
  }
  @keyframes breathe{ 0%,100%{opacity:.35;} 50%{opacity:1;} }
  @media (prefers-reduced-motion: reduce){ .tile.urgent::after{ animation:none; } }

  .eyebrow{ font-family:var(--mono); font-size:11px; font-weight:600; letter-spacing:1.7px; color:var(--text-dim); text-transform:uppercase; }
  .eyebrow-row{ display:flex; align-items:baseline; justify-content:space-between; gap:10px; margin-bottom:16px; }
  .count-badge{ font-family:var(--mono); font-size:12px; color:var(--text-faint); }

  .hero{ display:flex; align-items:flex-end; justify-content:space-between; gap:20px; }
  .clock{ font-family:var(--mono); font-weight:600; font-size:84px; line-height:.9; letter-spacing:-2px; font-variant-numeric:tabular-nums; }
  .clock-sec{ font-size:30px; color:var(--text-dim); font-weight:500; }
  .date{ margin-top:14px; font-size:17px; color:var(--text-dim); text-transform:capitalize; }
  .weather-box{ text-align:right; flex-shrink:0; }
  .weather-temp{ font-family:var(--mono); font-size:40px; font-weight:600; line-height:1; display:flex; align-items:center; gap:10px; justify-content:flex-end; }
  .weather-temp svg{ width:34px;height:34px;color:var(--accent); }
  .weather-desc{ font-size:14px; color:var(--text-dim); margin-top:6px; }

  .now-strip{ font-size:16px; line-height:1.6; }
  .now-strip b{ color:var(--accent); font-weight:700; }
  .now-strip .sep{ color:var(--text-faint); margin:0 9px; }
  .now-strip.calm{ color:var(--text-dim); }

  .list{ list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:9px; }
  .list-item{ display:flex; align-items:center; gap:12px; }
  .list-item .item-text{ flex:1; font-size:15.5px; min-width:0; word-break:break-word; }
  .list-item.done .item-text{ color:var(--text-faint); text-decoration:line-through; }
  .check{ width:20px;height:20px;flex-shrink:0;border-radius:6px;border:1.5px solid var(--line);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s; }
  .check:hover{ border-color:var(--accent); }
  .check.on{ background:var(--accent); border-color:var(--accent); }
  .check svg{ display:none; width:12px;height:12px;color:var(--bg); }
  .check.on svg{ display:block; }
  .project-tag{ font-family:var(--mono); font-size:10.5px; color:var(--accent); background:var(--accent-soft); padding:3px 8px; border-radius:6px; flex-shrink:0; }
  .meeting-time{ font-family:var(--mono); font-size:14.5px; color:var(--text-dim); flex-shrink:0; width:48px; }
  .list-item.next-meeting .meeting-time{ color:var(--accent); }
  .bill-amount{ font-family:var(--mono); font-size:14px; color:var(--text-dim); flex-shrink:0; }
  .bill-due{ font-family:var(--mono); font-size:12px; color:var(--text-faint); flex-shrink:0; width:38px; }
  .list-item.overdue .bill-due{ color:var(--danger); }
  .empty-state{ font-size:14px; color:var(--text-faint); font-style:italic; }
  .skeleton{ color:var(--text-faint); font-size:14px; font-style:italic; }

  .metric{ display:flex; flex-direction:column; justify-content:space-between; min-height:118px; }
  .metric-icon{ width:24px;height:24px;color:var(--text-faint); }
  .metric.hot .metric-icon{ color:var(--accent); }
  .metric-value{ font-family:var(--mono); font-size:30px; font-weight:600; line-height:1; }
  .metric-label{ font-size:13px; color:var(--text-dim); margin-top:4px; }
  .metric-sub{ font-family:var(--mono); font-size:12px; color:var(--accent); margin-top:2px; min-height:14px; }

  .capture-input{ width:100%; background:var(--bg); border:1px solid var(--line); color:var(--text); font-family:var(--sans); font-size:15px; padding:13px 15px; border-radius:12px; }
  .capture-input::placeholder{ color:var(--text-faint); }
  .capture-hint{ font-family:var(--mono); font-size:11px; color:var(--text-faint); margin-top:9px; }

  .footer{ grid-column:span 2; text-align:center; font-family:var(--mono); font-size:11px; color:var(--text-faint); display:flex; align-items:center; justify-content:center; gap:8px; padding:4px 0 2px; }
  .dot{ width:7px;height:7px;border-radius:50%;background:var(--good); }
  .dot.stale{ background:var(--danger); }
</style>
</head>
<body>
<div class="grid" id="grid">

  <div class="tile col-2 hero">
    <div>
      <div class="clock"><span id="clock-time">--:--</span><span class="clock-sec" id="clock-sec">:--</span></div>
      <div class="date" id="clock-date">—</div>
    </div>
    <div class="weather-box" id="weather-box"><span class="skeleton">погода…</span></div>
  </div>

  <div class="tile col-2" id="now-tile">
    <div class="eyebrow-row"><span class="eyebrow">Сейчас важно</span></div>
    <div class="now-strip calm" id="now-strip">Собираю картину дня…</div>
  </div>

  <div class="tile row-tall">
    <div class="eyebrow-row"><span class="eyebrow">Задачи</span><span class="count-badge" id="tasks-count"></span></div>
    <ul class="list" id="tasks-list"><li class="skeleton">загрузка…</li></ul>
  </div>

  <div class="tile row-tall">
    <div class="eyebrow-row"><span class="eyebrow">Расписание</span></div>
    <ul class="list" id="cal-list"><li class="skeleton">загрузка…</li></ul>
  </div>

  <div class="tile col-2">
    <div class="eyebrow-row"><span class="eyebrow">Платежи месяца</span><span class="count-badge" id="bills-count"></span></div>
    <ul class="list" id="bills-list"><li class="skeleton">загрузка…</li></ul>
  </div>

  <div class="tile metric" id="inbox-tile">
    <svg class="metric-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M4 13h4l2 3h4l2-3h4"/><path d="M4 13V6a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v7M4 13v5a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-5"/></svg>
    <div><div class="metric-value" id="inbox-value">·</div><div class="metric-label">в инбоксе</div></div>
  </div>
  <div class="tile metric" id="bday-tile">
    <svg class="metric-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M4 21h16M4 21v-7a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v7M8 12V9M12 12V9M16 12V9M12 6V4M8 7V5.5M16 7V5.5"/></svg>
    <div><div class="metric-value" id="bday-value">—</div><div class="metric-label" id="bday-label">дни рождения</div><div class="metric-sub" id="bday-sub"></div></div>
  </div>

  <div class="tile metric" id="reads-tile">
    <svg class="metric-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5a2 2 0 0 1 2-2h12v16H6a2 2 0 0 0-2 2zM4 19V5"/></svg>
    <div><div class="metric-value" id="reads-value">·</div><div class="metric-label">почитать</div></div>
  </div>
  <div class="tile">
    <div class="eyebrow-row"><span class="eyebrow">Захват</span></div>
    <input type="text" id="capture-input" class="capture-input" placeholder="Мысль, ссылка… Enter" />
    <div class="capture-hint" id="capture-hint">→ в инбокс</div>
  </div>

  <div class="footer"><span class="dot" id="health-dot"></span><span id="health-text">подключение…</span></div>
</div>

<script>
(function(){
  "use strict";
  var API = "";
  var WEEKDAYS=["воскресенье","понедельник","вторник","среда","четверг","пятница","суббота"];
  var MONTHS=["января","февраля","марта","апреля","мая","июня","июля","августа","сентября","октября","ноября","декабря"];
  function pad(n){ return n<10?"0"+n:""+n; }
  function escapeHtml(s){ var d=document.createElement("div"); d.textContent=s==null?"":s; return d.innerHTML; }
  function parseUTC(s){ if(!s) return null; var d=new Date(s); return isNaN(d)?null:d; }
  function hm(d){ return pad(d.getHours())+":"+pad(d.getMinutes()); }
  function todayStr(){ var d=new Date(); return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate()); }
  function curMonth(){ var d=new Date(); return d.getFullYear()+"-"+pad(d.getMonth()+1); }

  function tickClock(){
    var n=new Date();
    document.getElementById("clock-time").textContent=pad(n.getHours())+":"+pad(n.getMinutes());
    document.getElementById("clock-sec").textContent=":"+pad(n.getSeconds());
    document.getElementById("clock-date").textContent=WEEKDAYS[n.getDay()]+", "+n.getDate()+" "+MONTHS[n.getMonth()];
  }
  tickClock(); setInterval(tickClock,1000);

  async function getJSON(p){ var r=await fetch(API+p,{headers:{Accept:"application/json"}}); if(!r.ok) throw new Error(p+" "+r.status); return r.json(); }
  async function send(p,m,b){ var r=await fetch(API+p,{method:m,headers:{"Content-Type":"application/json"},body:b?JSON.stringify(b):undefined}); if(!r.ok) throw new Error(p+" "+r.status); return r.json(); }
  var CHECK='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg>';

  var snap={nextMeeting:null,nextMeetingSoon:false,tasksToday:0,tasksDone:0,soonBill:null,soonBillOverdue:false};

  function renderNow(){
    var el=document.getElementById("now-strip");
    var tile=document.getElementById("now-tile");
    var parts=[];
    if(snap.nextMeeting) parts.push('Дальше: <b>'+snap.nextMeeting.time+' '+escapeHtml(snap.nextMeeting.title)+'</b>');
    var left=snap.tasksToday-snap.tasksDone;
    if(snap.tasksToday>0) parts.push(left>0?('задач: <b>'+left+'</b>'):'задачи сделаны');
    if(snap.soonBill) parts.push('платёж <b>'+escapeHtml(snap.soonBill.name)+'</b> '+snap.soonBill.when);
    if(!parts.length){ el.className="now-strip calm"; el.textContent="Пока ничего срочного — свободное окно."; tile.classList.remove("urgent"); return; }
    el.className="now-strip"; el.innerHTML=parts.join('<span class="sep">·</span>');
    tile.classList.toggle("urgent", snap.nextMeetingSoon || snap.soonBillOverdue);
  }

  var WCODE={0:["Ясно","sun"],1:["Малооблачно","cloud"],2:["Облачно","cloud"],3:["Пасмурно","cloud"],45:["Туман","cloud"],48:["Туман","cloud"],51:["Морось","rain"],53:["Морось","rain"],55:["Морось","rain"],61:["Дождь","rain"],63:["Дождь","rain"],65:["Дождь","rain"],71:["Снег","snow"],73:["Снег","snow"],75:["Снег","snow"],80:["Ливень","rain"],81:["Ливень","rain"],82:["Ливень","rain"],95:["Гроза","rain"],96:["Гроза","rain"],99:["Гроза","rain"]};
  var WICON={
    sun:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><circle cx="12" cy="12" r="4.5"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3M4.9 4.9l2.1 2.1M17 17l2.1 2.1M19.1 4.9 17 7M7 17l-2.1 2.1"/></svg>',
    cloud:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><path d="M6.5 19h11a4 4 0 0 0 .6-7.96A5.5 5.5 0 0 0 7.6 10.3 3.8 3.8 0 0 0 6.5 19Z"/></svg>',
    rain:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><path d="M6.5 13.5h11a4 4 0 0 0 .4-7.97A5.5 5.5 0 0 0 7.6 4.8 3.8 3.8 0 0 0 6.5 13.5Z"/><path d="M8 17.5 7 20M12 17.5l-1 2.5M16 17.5l-1 2.5"/></svg>',
    snow:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><path d="M6.5 13h11a4 4 0 0 0 .4-7.97A5.5 5.5 0 0 0 7.6 4.3 3.8 3.8 0 0 0 6.5 13Z"/><path d="M9 17v3M12 18v3M15 17v3"/></svg>'
  };
  async function loadWeather(){
    try{
      var d=await(await fetch("https://api.open-meteo.com/v1/forecast?latitude=50.11&longitude=8.68&current=temperature_2m,weather_code&timezone=auto")).json();
      var i=WCODE[d.current.weather_code]||["—","cloud"];
      document.getElementById("weather-box").innerHTML='<div class="weather-temp">'+WICON[i[1]]+Math.round(d.current.temperature_2m)+'°</div><div class="weather-desc">'+i[0]+', Франкфурт</div>';
    }catch(e){ document.getElementById("weather-box").innerHTML='<span class="skeleton">—</span>'; }
  }

  async function loadTasks(){
    var list=document.getElementById("tasks-list");
    try{
      var data=await getJSON("/api/tasks");
      var tasks=(data.tasks||[]).filter(function(t){return t.status!=="cancelled";});
      var today=todayStr();
      var tt=tasks.filter(function(t){return t.due_date===today||!t.due_date;});
      var done=tt.filter(function(t){return t.status==="done";}).length;
      snap.tasksToday=tt.length; snap.tasksDone=done;
      document.getElementById("tasks-count").textContent=tt.length?(done+"/"+tt.length):"";
      if(!tt.length){ list.innerHTML='<div class="empty-state">На сегодня задач нет</div>'; renderNow(); return; }
      list.innerHTML="";
      tt.forEach(function(t){
        var li=document.createElement("li");
        var ch=t.status==="done";
        li.className="list-item"+(ch?" done":"");
        li.innerHTML='<div class="check'+(ch?" on":"")+'" role="checkbox" tabindex="0" aria-checked="'+ch+'">'+CHECK+'</div><span class="item-text"></span>'+(t.project?'<span class="project-tag">'+escapeHtml(t.project)+'</span>':'');
        li.querySelector(".item-text").textContent=t.title;
        var box=li.querySelector(".check");
        function tog(){ send("/api/tasks/"+t.id,"PATCH",{status:box.classList.contains("on")?"todo":"done"}).then(loadTasks).catch(stale); }
        box.addEventListener("click",tog);
        box.addEventListener("keydown",function(e){ if(e.key===" "||e.key==="Enter"){e.preventDefault();tog();} });
        list.appendChild(li);
      });
      renderNow();
    }catch(e){ list.innerHTML='<div class="empty-state">Не удалось загрузить</div>'; stale(); }
  }

  async function loadCalendar(){
    var list=document.getElementById("cal-list");
    try{
      var ev=await getJSON("/api/calendar/today");
      ev=Array.isArray(ev)?ev:(ev.events||[]);
      var now=new Date(), nextId=null;
      ev.forEach(function(e){ var s=parseUTC(e.start); if(s&&s>now&&nextId===null) nextId=e.id; });
      snap.nextMeeting=null; snap.nextMeetingSoon=false;
      var nx=ev.filter(function(e){return e.id===nextId;})[0];
      if(nx){ var s=parseUTC(nx.start); snap.nextMeeting={time:hm(s),title:nx.title}; snap.nextMeetingSoon=(s-now)<3600000; }
      if(!ev.length){ list.innerHTML='<div class="empty-state">Встреч сегодня нет</div>'; renderNow(); return; }
      list.innerHTML="";
      ev.forEach(function(e){
        var s=parseUTC(e.start);
        var li=document.createElement("li");
        li.className="list-item"+(e.id===nextId?" next-meeting":"");
        li.innerHTML='<span class="meeting-time">'+(s?hm(s):"—")+'</span><span class="item-text"></span>';
        li.querySelector(".item-text").textContent=e.title;
        list.appendChild(li);
      });
      renderNow();
    }catch(e){ list.innerHTML='<div class="empty-state">Календарь недоступен</div>'; renderNow(); }
  }

  async function loadBills(){
    var list=document.getElementById("bills-list");
    try{
      var data=await getJSON("/api/bills?month="+curMonth());
      var bills=data.bills||[];
      var paid=bills.filter(function(b){return b.status==="paid";}).length;
      document.getElementById("bills-count").textContent=bills.length?(paid+"/"+bills.length):"";
      var today=todayStr();
      snap.soonBill=null; snap.soonBillOverdue=false;
      var pend=bills.filter(function(b){return b.status==="pending";}).sort(function(a,b){return a.due_date<b.due_date?-1:1;});
      if(pend.length){
        var b0=pend[0];
        var diff=Math.round((new Date(b0.due_date)-new Date(today))/86400000);
        if(diff<=3){ snap.soonBill={name:b0.name,when:diff<0?"просрочен":(diff===0?"сегодня":"через "+diff+"д")}; snap.soonBillOverdue=diff<0; }
      }
      if(!bills.length){ list.innerHTML='<div class="empty-state">Платежей в этом месяце нет</div>'; renderNow(); return; }
      list.innerHTML="";
      bills.forEach(function(b){
        var pd=b.status==="paid", ov=!pd&&b.due_date<today;
        var day=b.due_date?b.due_date.slice(8,10)+".":"";
        var li=document.createElement("li");
        li.className="list-item"+(pd?" done":"")+(ov?" overdue":"");
        li.innerHTML='<div class="check'+(pd?" on":"")+'" role="checkbox" tabindex="0" aria-checked="'+pd+'">'+CHECK+'</div><span class="bill-due">'+day+'</span><span class="item-text"></span>'+(b.amount!=null?'<span class="bill-amount">'+b.amount+'</span>':'');
        li.querySelector(".item-text").textContent=b.name||"—";
        var box=li.querySelector(".check");
        function tog(){ send("/api/bills/"+b.id,"PATCH",{status:box.classList.contains("on")?"pending":"paid"}).then(loadBills).catch(stale); }
        box.addEventListener("click",tog);
        box.addEventListener("keydown",function(e){ if(e.key===" "||e.key==="Enter"){e.preventDefault();tog();} });
        list.appendChild(li);
      });
      renderNow();
    }catch(e){ list.innerHTML='<div class="empty-state">Не удалось загрузить</div>'; }
  }

  async function loadMetrics(){
    try{ var ib=await getJSON("/api/inbox?status=pending"); var n=(ib.items||[]).length; document.getElementById("inbox-value").textContent=n; document.getElementById("inbox-tile").classList.toggle("hot",n>0); }catch(e){ document.getElementById("inbox-value").textContent="·"; }
    try{
      var bd=await getJSON("/api/contacts/birthdays?days=7"); var l=bd.birthdays||[];
      if(l.length){ var b=l[0]; document.getElementById("bday-value").textContent=b.in_days<=0?"!":b.in_days+"д"; document.getElementById("bday-label").textContent=escapeHtml(b.name); document.getElementById("bday-sub").textContent=b.in_days<=0?"сегодня!":"скоро"; document.getElementById("bday-tile").classList.add("hot"); }
      else{ document.getElementById("bday-value").textContent="—"; document.getElementById("bday-label").textContent="дни рождения"; document.getElementById("bday-sub").textContent=""; document.getElementById("bday-tile").classList.remove("hot"); }
    }catch(e){ document.getElementById("bday-value").textContent="—"; }
    try{ var rd=await getJSON("/api/reads?status=unread"); var rn=(rd.reads||[]).length; document.getElementById("reads-value").textContent=rn; document.getElementById("reads-tile").classList.toggle("hot",rn>0); }catch(e){ document.getElementById("reads-value").textContent="·"; }
  }

  var cap=document.getElementById("capture-input"), capHint=document.getElementById("capture-hint");
  cap.addEventListener("keydown",function(e){
    if(e.key!=="Enter") return;
    var t=cap.value.trim(); if(!t) return;
    send("/api/inbox","POST",{text:t,source:"dashboard"}).then(function(){
      cap.value=""; capHint.textContent="✓ записано";
      setTimeout(function(){ capHint.textContent="→ в инбокс"; },2000); loadMetrics();
    }).catch(function(){ capHint.textContent="не удалось — ещё раз"; });
  });

  function ok(){ var d=document.getElementById("health-dot"); d.className="dot"; document.getElementById("health-text").textContent="обновлено "+hm(new Date()); }
  function stale(){ var d=document.getElementById("health-dot"); d.className="dot stale"; document.getElementById("health-text").textContent="нет связи с ядром"; }

  async function refresh(){
    try{ await Promise.all([loadTasks(),loadCalendar(),loadBills(),loadMetrics()]); ok(); }
    catch(e){ stale(); }
  }
  loadWeather(); refresh();
  setInterval(refresh,45000);
  setInterval(loadWeather,30*60*1000);
})();
</script>
</body>
</html>
