services:
  bot:
    build: .
    env_file: .env
    environment:
      # Переопределяют значения из .env: внутри контейнера пути и хост свои
      - OBSIDIAN_VAULT_PATH=/app/bot-memory
      - WEB_HOST=0.0.0.0
    ports:
      # Веб-интерфейс. На веб нет авторизации — наружу открывать только
      # за reverse-proxy с auth; localhost-привязка оставляет доступ через SSH-туннель
      - "127.0.0.1:8000:8000"
    volumes:
      - ./bot-memory:/app/bot-memory
      - ./chroma_db:/app/chroma_db
      # SQLite-базы задач, платежей, журнала действий, инбокса и лога подсказок:
      # одиночные файлы, хостовые .db должны существовать до старта (иначе Docker
      # создаст на их месте каталоги). Перед `docker compose up`:
      # touch actions.db inbox.db suggestions.db
      - ./tasks.db:/app/tasks.db
      - ./bills.db:/app/bills.db
      - ./actions.db:/app/actions.db
      - ./inbox.db:/app/inbox.db
      - ./suggestions.db:/app/suggestions.db
      # Google Calendar OAuth. token.json бот перезаписывает при рефреше — поэтому
      # rw и через volume, чтобы переживал пересборку; credentials.json только читается (ro).
      # Те же грабли с одиночными файлами: должны существовать на хосте до старта,
      # иначе Docker создаст каталоги (load_calendar проверяет is_file и тогда просто
      # отключит календарь). Если календарь не используешь — закомментируй эти две строки.
      - ./credentials.json:/app/credentials.json:ro
      - ./token.json:/app/token.json
    restart: unless-stopped
