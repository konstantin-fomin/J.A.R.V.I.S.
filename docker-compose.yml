services:
  bot:
    build: .
    env_file: .env
    environment:
      # Переопределяют значения из .env: внутри контейнера пути и хост свои
      - OBSIDIAN_VAULT_PATH=/app/bot-memory
      - WEB_HOST=0.0.0.0
    ports:
      # Веб-интерфейс. На веб нет авторизации — наружу открывать только
      # за reverse-proxy с auth; localhost-привязка оставляет доступ через SSH-туннель
      - "127.0.0.1:8000:8000"
    volumes:
      - ./bot-memory:/app/bot-memory
      - ./chroma_db:/app/chroma_db
      # SQLite-база задач: одиночный файл, хостовый tasks.db должен существовать
      # до старта (иначе Docker создаст на его месте каталог)
      - ./tasks.db:/app/tasks.db
    restart: unless-stopped
