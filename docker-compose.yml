services:
  bot:
    build: .
    env_file: .env
    environment:
      # Переопределяет значение из .env: внутри контейнера путь к памяти свой
      - OBSIDIAN_VAULT_PATH=/app/bot-memory
    volumes:
      - ./bot-memory:/app/bot-memory
      - ./chroma_db:/app/chroma_db
    restart: unless-stopped
